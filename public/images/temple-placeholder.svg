<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="600" fill="#F3F1EC"/>

  <!-- Temple silhouette -->
  <g transform="translate(400,300)" fill="none" stroke="#A09A92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main shikhara (spire) -->
    <path d="M0-120 L-8-100 L-12-80 L-14-60 L-16-40 L-20-20 L-24 0 L24 0 L20-20 L16-40 L14-60 L12-80 L8-100 Z" fill="#E5E0D5" stroke="#A09A92"/>

    <!-- Kalasha (pinnacle) -->
    <circle cx="0" cy="-128" r="5" fill="#E5E0D5" stroke="#A09A92"/>
    <line x1="0" y1="-133" x2="0" y2="-142" stroke="#A09A92" stroke-width="1.5"/>

    <!-- Horizontal bands on shikhara -->
    <line x1="-11" y1="-80" x2="11" y2="-80"/>
    <line x1="-14" y1="-60" x2="14" y2="-60"/>
    <line x1="-17" y1="-40" x2="17" y2="-40"/>
    <line x1="-20" y1="-20" x2="20" y2="-20"/>

    <!-- Main body / mandapa -->
    <rect x="-60" y="0" width="120" height="80" fill="#E5E0D5" stroke="#A09A92" rx="1"/>

    <!-- Pillars -->
    <line x1="-45" y1="0" x2="-45" y2="80"/>
    <line x1="-15" y1="0" x2="-15" y2="80"/>
    <line x1="15" y1="0" x2="15" y2="80"/>
    <line x1="45" y1="0" x2="45" y2="80"/>

    <!-- Doorway arch -->
    <path d="M-12 80 L-12 50 Q-12 38 0 38 Q12 38 12 50 L12 80" fill="#F3F1EC" stroke="#A09A92"/>

    <!-- Steps -->
    <rect x="-70" y="80" width="140" height="8" fill="#E5E0D5" stroke="#A09A92" rx="1"/>
    <rect x="-78" y="88" width="156" height="8" fill="#E5E0D5" stroke="#A09A92" rx="1"/>

    <!-- Small side shikharas -->
    <path d="M-50-10 L-50 0" stroke="#A09A92"/>
    <path d="M-55 0 L-45 0 L-47-15 L-50-25 L-53-15 Z" fill="#E5E0D5" stroke="#A09A92"/>
    <path d="M50-10 L50 0" stroke="#A09A92"/>
    <path d="M55 0 L45 0 L47-15 L50-25 L53-15 Z" fill="#E5E0D5" stroke="#A09A92"/>

    <!-- Om symbol (subtle, below temple) -->
    <text x="0" y="130" text-anchor="middle" font-family="serif" font-size="18" fill="#C4BEB6" opacity="0.6">ॐ</text>
  </g>
</svg>
